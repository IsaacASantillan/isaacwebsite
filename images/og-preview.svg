<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="20%" cy="20%" r="80%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b2635"/>
      <stop offset="55%" stop-color="#0d1216"/>
      <stop offset="100%" stop-color="#0a0f13"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <!-- Neon title: line 1 -->
  <text x="600" y="240"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-weight="900"
    font-size="108"
    letter-spacing="3"
    fill="none"
    stroke="rgba(91,206,255,0.9)"
    stroke-width="2"
    filter="url(#glow)">welcome to</text>

  <!-- Neon title: line 2 -->
  <text x="600" y="370"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-weight="900"
    font-size="108"
    letter-spacing="3"
    fill="none"
    stroke="rgba(91,206,255,0.9)"
    stroke-width="2"
    filter="url(#glow)">computer scientist</text>

  <!-- Subtitle -->
  <text x="600" y="450"
    text-anchor="middle"
    font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
    font-weight="800"
    font-size="22"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="4">ISAAC SANTILLAN</text>
</svg>
